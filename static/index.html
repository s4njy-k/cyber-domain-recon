<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cyber Threat Recon</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/styles.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>

<div class="container">
    <div class="sidebar">
        <div class="glass-panel">
            <div class="auth-header">
                <h1>Cyber Recon AI</h1>
                <p>Automated OSINT & Threat Intel</p>
            </div>
            
            <div class="input-area">
                <textarea id="domainInput" placeholder="Paste domains here (one per line)...&#10;&#10;example.com&#10;phishing-site.net"></textarea>
                <button class="btn-launch" onclick="launchScan()">Initiate Pipeline</button>
            </div>

            <div class="status-module">
                <div style="color: var(--text-primary); font-weight: 600; font-size: 14px;">Pipeline Status</div>
                <div class="progress-track">
                    <div class="progress-bar" id="progressBar"></div>
                </div>
                <div class="status-text">
                    <span id="statusLabel">Awaiting Input...</span>
                    <span id="statusCount">0%</span>
                </div>
            </div>
        </div>
    </div>

    <div class="main-content">
        <div class="glass-panel" style="padding: 0; min-height: 500px; display: flex; flex-direction: column;">
            <div id="reportPlaceholder" style="color: var(--text-secondary); text-align: center; margin: auto; padding: 50px;">
                Scan results will stream here globally. <br><br> Wait for completion to view full AI parsed IoC evidence.
            </div>
            <iframe id="reportFrame" style="display: none; width: 100%; flex-grow: 1; border: none; border-radius: 16px; min-height: 800px;"></iframe>
        </div>
    </div>
</div>

<script>
    async function launchScan() {
        const text = document.getElementById("domainInput").value;
        const domains = text.split("\n").map(d => d.trim()).filter(d => d);
        if(domains.length === 0) return alert("Please enter some domains!");

        const btn = document.querySelector('.btn-launch');
        btn.innerText = "Queueing...";
        btn.disabled = true;

        try {
            const res = await fetch("/api/scan", {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify({domains})
            });
            const data = await res.json();
            if(data.status === "error") throw new Error(data.message);
        } catch(e) {
            alert("Failed to start scan: " + e.message);
            btn.innerText = "Initiate Pipeline";
            btn.disabled = false;
        }
    }

    async function pollStatus() {
        try {
            const res = await fetch("/api/status");
            const data = await res.json();
            
            document.getElementById('statusLabel').innerText = data.message;
            if(data.total > 0) {
                const percent = Math.round((data.progress / data.total) * 100);
                document.getElementById('progressBar').style.width = percent + "%";
                document.getElementById('statusCount').innerText = percent + "%";
            }
            
            if(data.phase === "complete") {
                showReportFrame();
            }
        } catch(e) {
            console.error("Polling error", e);
        }
    }

    function showReportFrame() {
        // Use cache-busting so it reloads latest report.html
        const frame = document.getElementById('reportFrame');
        if (frame.style.display === 'none') {
            document.getElementById('reportPlaceholder').style.display = 'none';
            frame.style.display = 'block';
            frame.src = '/reports/report.html?t=' + new Date().getTime();
        } else if (!frame.src.includes('report.html')) {
            frame.src = '/reports/report.html?t=' + new Date().getTime();
        }
    }

    // Ping status every 3 seconds
    setInterval(pollStatus, 3000);
    // Try forcing a report view on load
    fetch('/reports/report.html').then(res => {
        if (res.ok) { showReportFrame(); }
    });
</script>

</body>
</html>
