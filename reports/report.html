<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cyber Threat Intelligence Report</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: transparent;
            --card-bg: rgba(22, 28, 45, 0.7);
            --glass-border: rgba(255, 255, 255, 0.08);
            --accent: #00ff88;
            --accent-glow: rgba(0, 255, 136, 0.3);
            --danger: #ff4757;
            --warning: #ffa502;
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
        }
        body {
            background-color: var(--bg-color);
            color: var(--text-primary);
            font-family: 'Inter', -apple-system, sans-serif;
            margin: 0;
            padding: 20px;
        }
        h1, h2, h3, h4 { color: #fff; }
        .container { max-width: 1200px; margin: 0 auto; }
        
        .dashboard-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 40px; }
        .stat-card { background: var(--card-bg); border: 1px solid var(--glass-border); border-radius: 12px; padding: 20px; text-align: center; backdrop-filter: blur(10px); }
        .stat-card h3 { margin: 0; color: var(--text-secondary); font-size: 0.85rem; text-transform: uppercase; letter-spacing: 1px; }
        .stat-card .value { font-size: 2.2rem; font-weight: 700; margin: 10px 0 0; color: var(--text-primary); }
        
        .target-card { background: var(--card-bg); border: 1px solid var(--glass-border); border-radius: 12px; padding: 25px; margin-bottom: 30px; backdrop-filter: blur(10px); box-shadow: 0 4px 20px rgba(0,0,0,0.15); }
        .target-card h2 { margin-top: 0; border-bottom: 1px solid var(--glass-border); padding-bottom: 15px; color: #fff; font-size: 1.4rem; display: flex; align-items: center; gap: 10px; }
        
        .telemetry-table { width: 100%; border-collapse: collapse; margin-bottom: 25px; font-size: 0.9rem; }
        .telemetry-table th, .telemetry-table td { text-align: left; padding: 10px 15px; border-bottom: 1px solid var(--glass-border); }
        .telemetry-table th { color: var(--text-secondary); font-weight: 600; width: 30%; }
        
        .exec-summary { background: rgba(0, 255, 136, 0.05); border-left: 4px solid var(--accent); padding: 15px 20px; border-radius: 0 8px 8px 0; margin-bottom: 25px; line-height: 1.6; font-size: 0.95rem; }
        
        .evidence-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .evidence-card { background: rgba(0,0,0,0.3); border: 1px solid rgba(255, 71, 87, 0.3); border-radius: 8px; overflow: hidden; }
        .evidence-header { background: rgba(255, 71, 87, 0.1); padding: 10px 15px; font-weight: 600; font-size: 0.9rem; color: #ff6b81; border-bottom: 1px solid rgba(255, 71, 87, 0.2); }
        .evidence-body { padding: 15px; }
        .evidence-body p { margin-top: 0; font-size: 0.9rem; line-height: 1.5; color: #cbd5e1; }
        .evidence-img { width: 100%; border-radius: 4px; border: 1px solid var(--glass-border); }
        
        .ioc-section { margin-top: 25px; padding-top: 20px; border-top: 1px dashed var(--glass-border); }
        .ioc-list { list-style: none; padding: 0; margin: 0 0 15px 0; }
        .ioc-list li { background: rgba(0,0,0,0.2); padding: 8px 12px; border-radius: 6px; margin-bottom: 8px; font-family: monospace; font-size: 0.85rem; display: flex; align-items: center; gap: 10px; border: 1px solid var(--glass-border); word-break: break-all; }
        .ioc-badge { background: var(--danger); color: white; padding: 2px 6px; border-radius: 4px; font-size: 0.7rem; font-weight: bold; flex-shrink: 0; }
        .ioc-badge.http { background: var(--warning); color: #000; }
        
        .source-image-btn { display: inline-block; background: transparent; color: #74b9ff; border: 1px solid #74b9ff; padding: 8px 16px; border-radius: 6px; text-decoration: none; font-size: 0.9rem; font-weight: 600; cursor: pointer; transition: 0.2s; }
        .source-image-btn:hover { background: rgba(116, 185, 255, 0.1); }
    </style>
</head>
<body>
    <div class="container">
        
        <!-- Dashboard Stats -->
        <div class="dashboard-grid">
            <div class="stat-card">
                <h3>Total Targets Scanned</h3>
                <div class="value">0</div>
            </div>
            <div class="stat-card">
                <h3>Successful Captures</h3>
                <div class="value" style="color: #74b9ff;">0</div>
            </div>
            <div class="stat-card">
                <h3>Threat Indicators</h3>
                <div class="value" style="color: var(--danger);">
                    
                    
                    0
                </div>
            </div>
        </div>

        
    </div>
</body>
</html>
